name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: mlops_mobile_price
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        working-directory: mlops_mobile_price
        run: ruff check .

      - name: Run training
        working-directory: mlops_mobile_price
        run: python -m pipeline.training.train

      - name: Run API smoke test
        working-directory: mlops_mobile_price
        run: |
          python -c "from fastapi.testclient import TestClient; from api.main import app; c=TestClient(app); assert c.get('/health').status_code == 200"

      - name: Build Docker image
        working-directory: mlops_mobile_price
        run: docker build -f docker/Dockerfile -t mlops-mobile-price .
